<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trash Gxng | Attendance</title>
  <style>
    :root {
      --yellow: #F5C500;
      --black: #111111;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--yellow);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* ── Header ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--black);
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px 0 20px;
      z-index: 100;
      border-bottom-left-radius: 28px;
    }

    /* Back button (inside header, left side) */
    .back-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.55);
      font-size: 22px;
      cursor: pointer;
      padding: 6px 10px 6px 0;
      line-height: 1;
      transition: color 0.18s;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-btn:hover { color: var(--white); }
    .back-btn.hidden { visibility: hidden; pointer-events: none; }
    .back-btn span { font-size: 13px; letter-spacing: 0.5px; }

    /* Logo image — replace logo.png with your own file at any time */
    .logo-img {
      height: 36px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    /* Fallback text shown only if image fails to load */
    .logo-fallback {
      color: var(--white);
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      display: none;
    }
    .logo-fallback .x { color: var(--yellow); }

    /* ── Side watermark ── */
    .side-text {
      position: fixed;
      right: -38px;
      top: 50%;
      transform: translateY(-50%) rotate(90deg);
      font-size: 11px;
      letter-spacing: 4px;
      color: rgba(0,0,0,0.15);
      white-space: nowrap;
      pointer-events: none;
      text-transform: lowercase;
    }

    /* ── Progress bar ── */
    .progress-bar {
      position: fixed;
      top: 58px;
      left: 0;
      height: 3px;
      background: var(--black);
      width: 0%;
      transition: width 0.5s cubic-bezier(0.77,0,0.175,1);
      z-index: 99;
    }

    /* ── Slides ── */
    .slides { position: relative; height: 100vh; width: 100%; }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 100px 10vw 60px;
      transform: translateY(100%);
      transition: transform 0.48s cubic-bezier(0.77,0,0.175,1), opacity 0.48s ease;
      opacity: 0;
      pointer-events: none;
    }
    .slide.active  { transform: translateY(0);    opacity: 1; pointer-events: all; }
    .slide.past    { transform: translateY(-100%); opacity: 0; pointer-events: none; }

    .step-num {
      font-size: 12px;
      font-weight: 700;
      color: rgba(0,0,0,0.4);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .question {
      font-size: clamp(26px, 4vw, 50px);
      font-weight: 900;
      color: var(--black);
      margin-bottom: 36px;
      line-height: 1.15;
      max-width: 680px;
    }

    .input-wrap { position: relative; max-width: 500px; }

    .form-input {
      background: transparent;
      border: none;
      border-bottom: 3px solid rgba(0,0,0,0.28);
      font-size: clamp(20px, 3vw, 28px);
      font-weight: 700;
      color: var(--black);
      padding: 8px 0 10px;
      width: 100%;
      outline: none;
      font-family: Arial, sans-serif;
      transition: border-color 0.2s;
      caret-color: var(--black);
    }
    .form-input:focus   { border-bottom-color: var(--black); }
    .form-input::placeholder {
      color: rgba(0,0,0,0.28);
      font-weight: 400;
      font-size: clamp(18px, 2.5vw, 24px);
    }

    /* ── Autocomplete ── */
    .ac-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0; right: 0;
      background: var(--black);
      border-radius: 8px;
      overflow: hidden;
      z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.25);
    }
    .ac-list div {
      padding: 12px 18px;
      color: var(--white);
      font-size: 17px;
      font-family: Arial, sans-serif;
      cursor: pointer;
      transition: background 0.12s;
    }
    .ac-list div:hover,
    .ac-list div.hi { background: #2a2a2a; }

    /* ── Session select ── */
    .select-wrap { position: relative; max-width: 500px; }
    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      color: rgba(0,0,0,0.5);
      pointer-events: none;
    }

    .session-select {
      background: transparent;
      border: none;
      border-bottom: 3px solid rgba(0,0,0,0.28);
      font-size: clamp(18px, 2.8vw, 26px);
      font-weight: 700;
      color: var(--black);
      padding: 8px 0 10px;
      width: 100%;
      outline: none;
      font-family: Arial, sans-serif;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s;
    }
    .session-select:focus { border-bottom-color: var(--black); }
    .session-select option { font-weight: 400; font-size: 18px; }

    /* ── CTA button ── */
    .cta-btn {
      margin-top: 28px;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 14px 30px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 5px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: Arial, sans-serif;
      letter-spacing: 1px;
      transition: opacity 0.18s, transform 0.1s;
      max-width: fit-content;
    }
    .cta-btn:hover  { opacity: 0.82; transform: translateY(-2px); }
    .cta-btn:active { transform: translateY(0); }

    .hint {
      margin-top: 14px;
      font-size: 12px;
      color: rgba(0,0,0,0.38);
      letter-spacing: 0.5px;
    }
    .hint strong { color: rgba(0,0,0,0.55); }

    /* Swipe hint */
    .swipe-hint {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(0,0,0,0.3);
    }

    .err {
      color: #b03030;
      font-size: 13px;
      font-weight: 700;
      margin-top: 8px;
      min-height: 16px;
    }

    /* ── Success screen ── */
    .success-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .success-tick {
      width: 64px; height: 64px;
      background: var(--black);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      color: var(--yellow);
      margin-bottom: 22px;
    }
    .success-title {
      font-size: clamp(32px, 5vw, 58px);
      font-weight: 900;
      color: var(--black);
      margin-bottom: 10px;
      line-height: 1.1;
    }
    .success-sub {
      font-size: clamp(16px, 2vw, 20px);
      color: rgba(0,0,0,0.55);
      margin-bottom: 36px;
      max-width: 480px;
      line-height: 1.5;
    }
    .success-sub strong { color: var(--black); }

    .next-btn {
      background: transparent;
      border: 3px solid var(--black);
      color: var(--black);
      padding: 13px 28px;
      font-size: 15px;
      font-weight: 700;
      border-radius: 5px;
      cursor: pointer;
      font-family: Arial, sans-serif;
      letter-spacing: 1px;
      transition: all 0.18s;
    }
    .next-btn:hover { background: var(--black); color: var(--yellow); }

    .countdown {
      margin-top: 16px;
      font-size: 12px;
      color: rgba(0,0,0,0.38);
    }

    /* ── iPad landscape fixes ── */
    @media (max-height: 600px) {
      .header { height: 50px; }
      .progress-bar { top: 50px; }
      .slide { padding: 68px 8vw 30px; }
      .question { font-size: clamp(20px, 3.5vh, 32px); margin-bottom: 20px; }
      .form-input { font-size: clamp(18px, 2.8vh, 24px); padding: 6px 0 8px; }
      .cta-btn { margin-top: 18px; padding: 11px 24px; font-size: 14px; }
      .hint, .swipe-hint { display: none; }
      .success-tick { width: 50px; height: 50px; font-size: 24px; margin-bottom: 14px; }
      .success-title { font-size: clamp(26px, 4vh, 40px); }
      .success-sub { font-size: 15px; margin-bottom: 20px; }
    }

    /* ── Small phones ── */
    @media (max-width: 480px) {
      .slide { padding: 90px 20px 50px; }
      .question { font-size: 26px; }
      .form-input { font-size: 22px; }
    }
  </style>
</head>
<body>

<header class="header">
  <button class="back-btn hidden" id="backBtn" onclick="goBack()">
    &#8592; <span>Back</span>
  </button>
  <!--
    LOGO: Replace "logo.png" with your image filename.
    Place your logo file in the same folder as attendance.html.
    Recommended: white version of the logo, PNG with transparent background.
    If the image is missing, the text fallback is shown automatically.
  -->
  <img class="logo-img" src="logo.png" alt="Trash Gxng"
       onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
  <div class="logo-fallback" id="logoFallback">TRASH | G<span class="x">X</span>NG</div>
</header>

<div class="progress-bar" id="progressBar"></div>
<div class="side-text">Welcome to the Gxng</div>

<div class="slides" id="slidesContainer">

  <!-- Slide 0 · First Name -->
  <div class="slide active" id="slide-0">
    <div class="step-num">1 / 3</div>
    <div class="question" id="q-first"></div>
    <div class="input-wrap">
      <input class="form-input" id="inp-first" type="text" placeholder="e.g. Marcus" autocomplete="off" spellcheck="false">
      <div class="ac-list" id="ac-first"></div>
    </div>
    <button class="cta-btn" onclick="advance()">OK &nbsp;&#10003;</button>
    <div class="hint">Press <strong>Enter &#8629;</strong> to continue</div>
    <div class="swipe-hint">Swipe up to go back</div>
    <div class="err" id="err-0"></div>
  </div>

  <!-- Slide 1 · Last Name -->
  <div class="slide" id="slide-1">
    <div class="step-num">2 / 3</div>
    <div class="question" id="q-last"></div>
    <div class="input-wrap">
      <input class="form-input" id="inp-last" type="text" placeholder="e.g. Johnson" autocomplete="off" spellcheck="false">
      <div class="ac-list" id="ac-last"></div>
    </div>
    <button class="cta-btn" onclick="advance()">OK &nbsp;&#10003;</button>
    <div class="hint">Press <strong>Enter &#8629;</strong> to continue</div>
    <div class="swipe-hint">Swipe up to go back</div>
    <div class="err" id="err-1"></div>
  </div>

  <!-- Slide 2 · Session -->
  <div class="slide" id="slide-2">
    <div class="step-num">3 / 3</div>
    <div class="question" id="q-session"></div>
    <div class="select-wrap">
      <select class="session-select" id="sel-session">
        <option value="">Choose a session&#8230;</option>
      </select>
    </div>
    <button class="cta-btn" onclick="submitForm()">Submit &nbsp;&#8594;</button>
    <div class="hint">Press <strong>Enter &#8629;</strong> to submit</div>
    <div class="swipe-hint">Swipe up to go back</div>
    <div class="err" id="err-2"></div>
  </div>

  <!-- Slide 3 · Success -->
  <div class="slide" id="slide-3">
    <div class="success-wrap">
      <div class="success-tick">&#10003;</div>
      <div class="success-title">You're in!</div>
      <div class="success-sub" id="success-sub"></div>
      <button class="next-btn" onclick="restart()">Next person &#8594;</button>
      <div class="countdown" id="countdown"></div>
    </div>
  </div>

</div>

<script>
// =====================================================================
//  CONFIGURATION — edit this section to customise the form at any time
// =====================================================================

const CONFIG = {

  // Google Apps Script Web App URL:
  SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxT6mgLWNrL839sGc1XAymvKd5tp8ajmSx6ColxjXIMo33T5szplZtz5sfH4q852tM/exec",

  // Question wording — change the text between the quotes:
  questions: {
    firstName: "What's your first name?",
    lastName:  "And your last name?",
    session:   "Which session are you attending today?",
  },

  // Sessions dropdown — add, remove or rename sessions here:
  sessions: [
    "Morning Drop-In",
    "Creative Workshop",
    "Employability Skills",
    "Streetwear Design",
    "Music Production",
    "Mentorship Session",
    "Open Session",
  ],

  // Seconds to show success screen before auto-resetting (0 = off):
  autoResetSeconds: 8,

};

// =====================================================================
//  CORE
// =====================================================================

let currentSlide = 0;
const TOTAL_STEPS = 3;
let knownNames = { first: [], last: [] };
let countdownTimer = null;

// ── Touch / swipe tracking ──────────────────────────────────────────
let touchStartY = 0;
let touchStartX = 0;

document.addEventListener("touchstart", e => {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener("touchend", e => {
  const dy = touchStartY - e.changedTouches[0].clientY; // positive = swipe up
  const dx = Math.abs(touchStartX - e.changedTouches[0].clientX);
  // Only trigger if mostly vertical swipe of 60px+ and not on success screen
  if (dy > 60 && dx < 60 && currentSlide > 0 && currentSlide < TOTAL_STEPS) {
    goBack();
  }
}, { passive: true });

// ── Boot ────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  applyConfig();
  fetchNamesFromSheet();
  bindKeyboard();
  updateBackBtn();
});

function applyConfig() {
  document.getElementById("q-first").textContent   = CONFIG.questions.firstName;
  document.getElementById("q-last").textContent    = CONFIG.questions.lastName;
  document.getElementById("q-session").textContent = CONFIG.questions.session;

  const sel = document.getElementById("sel-session");
  CONFIG.sessions.forEach(name => {
    const opt = document.createElement("option");
    opt.value = opt.textContent = name;
    sel.appendChild(opt);
  });
}

async function fetchNamesFromSheet() {
  try {
    const res  = await fetch(CONFIG.SCRIPT_URL + "?action=getNames");
    const json = await res.json();
    if (json.first) knownNames.first = [...new Set(json.first)];
    if (json.last)  knownNames.last  = [...new Set(json.last)];
  } catch (e) {
    console.warn("[Attendance] Could not load names:", e.message);
  }
  bindAutocomplete("inp-first", "ac-first", knownNames.first);
  bindAutocomplete("inp-last",  "ac-last",  knownNames.last);
}

// ── Autocomplete ────────────────────────────────────────────────────
function bindAutocomplete(inputId, listId, pool) {
  const inp  = document.getElementById(inputId);
  const list = document.getElementById(listId);
  let hiIdx  = -1;

  function render(val) {
    list.innerHTML = "";
    hiIdx = -1;
    if (!val) return;
    pool.filter(n => n.toLowerCase().startsWith(val.toLowerCase()))
        .slice(0, 6)
        .forEach(name => {
          const d = document.createElement("div");
          d.textContent = name;
          d.onmousedown = e => { e.preventDefault(); inp.value = name; list.innerHTML = ""; };
          // Touch support for iPad
          d.ontouchend = e => { e.preventDefault(); inp.value = name; list.innerHTML = ""; inp.blur(); };
          list.appendChild(d);
        });
  }

  inp.addEventListener("input",  () => render(inp.value.trim()));
  inp.addEventListener("blur",   () => setTimeout(() => { list.innerHTML = ""; hiIdx = -1; }, 200));
  inp.addEventListener("keydown", e => {
    const items = list.querySelectorAll("div");
    if      (e.key === "ArrowDown")  { e.preventDefault(); hiIdx = Math.min(hiIdx+1, items.length-1); }
    else if (e.key === "ArrowUp")    { e.preventDefault(); hiIdx = Math.max(hiIdx-1, -1); }
    else if (e.key === "Escape")     { list.innerHTML = ""; hiIdx = -1; return; }
    else return;
    items.forEach((el,i) => el.classList.toggle("hi", i === hiIdx));
    if (hiIdx >= 0 && items[hiIdx]) inp.value = items[hiIdx].textContent;
  });
}

// ── Keyboard navigation ─────────────────────────────────────────────
function bindKeyboard() {
  document.addEventListener("keydown", e => {
    if (e.key !== "Enter") return;
    const hasHi =
      document.querySelector("#ac-first .hi") ||
      document.querySelector("#ac-last .hi");
    if (hasHi) return;
    if (currentSlide < TOTAL_STEPS - 1) advance();
    else if (currentSlide === TOTAL_STEPS - 1) submitForm();
  });
}

// ── Back button visibility ──────────────────────────────────────────
function updateBackBtn() {
  const btn = document.getElementById("backBtn");
  if (currentSlide > 0 && currentSlide < TOTAL_STEPS) {
    btn.classList.remove("hidden");
  } else {
    btn.classList.add("hidden");
  }
}

// ── Go back ─────────────────────────────────────────────────────────
function goBack() {
  if (currentSlide <= 0) return;
  moveTo(currentSlide - 1);
  // Clear any errors on the slide we're returning to
  const errEl = document.getElementById("err-" + (currentSlide));
  if (errEl) errEl.textContent = "";
}

// ── Slide movement ───────────────────────────────────────────────────
function moveTo(idx) {
  document.querySelectorAll(".slide").forEach((el, i) => {
    el.classList.remove("active", "past");
    if (i < idx)       el.classList.add("past");
    else if (i === idx) el.classList.add("active");
  });
  currentSlide = idx;
  document.getElementById("progressBar").style.width =
    Math.round((idx / TOTAL_STEPS) * 100) + "%";
  updateBackBtn();

  const active = document.getElementById("slide-" + idx);
  if (active) {
    const f = active.querySelector("input, select");
    if (f) setTimeout(() => f.focus(), 480);
  }
}

// ── Advance (with validation) ────────────────────────────────────────
function advance() {
  if (currentSlide === 0) {
    const val = document.getElementById("inp-first").value.trim();
    if (!val) { document.getElementById("err-0").textContent = "Please enter your first name."; return; }
    document.getElementById("err-0").textContent = "";
    if (!knownNames.first.includes(val)) knownNames.first.push(val);
  }
  if (currentSlide === 1) {
    const val = document.getElementById("inp-last").value.trim();
    if (!val) { document.getElementById("err-1").textContent = "Please enter your last name."; return; }
    document.getElementById("err-1").textContent = "";
    if (!knownNames.last.includes(val)) knownNames.last.push(val);
  }
  moveTo(currentSlide + 1);
}

// ── Submit ───────────────────────────────────────────────────────────
async function submitForm() {
  const session = document.getElementById("sel-session").value;
  if (!session) { document.getElementById("err-2").textContent = "Please choose a session."; return; }
  document.getElementById("err-2").textContent = "";

  const firstName = document.getElementById("inp-first").value.trim();
  const lastName  = document.getElementById("inp-last").value.trim();
  const now       = new Date();
  const date      = now.toLocaleDateString("en-GB");
  const time      = now.toLocaleTimeString("en-GB", { hour: "2-digit", minute: "2-digit" });

  document.getElementById("success-sub").innerHTML =
    "<strong style='font-size:1.2em;color:#111'>" + firstName + " " + lastName + "</strong><br>" +
    "<span style='font-size:0.9em'>" + session + " &nbsp;&middot;&nbsp; " + date + " at " + time + "</span>";

  moveTo(3);
  document.getElementById("progressBar").style.width = "100%";
  startCountdown();

  try {
    await fetch(CONFIG.SCRIPT_URL, {
      method:  "POST",
      headers: { "Content-Type": "text/plain" },
      body:    JSON.stringify({ firstName, lastName, session, date, time }),
    });
  } catch (err) {
    console.error("[Attendance] Sheet sync failed:", err.message);
  }
}

// ── Countdown + reset ────────────────────────────────────────────────
function startCountdown() {
  const secs = CONFIG.autoResetSeconds;
  const el   = document.getElementById("countdown");
  if (!secs || secs <= 0) { el.textContent = ""; return; }
  let remaining = secs;
  el.textContent = "Resetting in " + remaining + "s\u2026";
  clearInterval(countdownTimer);
  countdownTimer = setInterval(() => {
    remaining--;
    if (remaining <= 0) { clearInterval(countdownTimer); restart(); }
    else el.textContent = "Resetting in " + remaining + "s\u2026";
  }, 1000);
}

function restart() {
  clearInterval(countdownTimer);
  document.getElementById("inp-first").value    = "";
  document.getElementById("inp-last").value     = "";
  document.getElementById("sel-session").value  = "";
  document.getElementById("ac-first").innerHTML = "";
  document.getElementById("ac-last").innerHTML  = "";
  document.getElementById("countdown").textContent = "";
  moveTo(0);
}
</script>
</body>
</html>
