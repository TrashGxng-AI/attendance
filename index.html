  <title>Trash Gxng | Attendance</title>

    :root {
      --yellow: #F5C500;
      --black: #111111;
      --white: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: var(--yellow);
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: var(--black);
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px 0 20px;
      z-index: 100;
      border-bottom-left-radius: 28px;
    }

    .back-btn {
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.4);
      color: var(--white);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      padding: 7px 16px;
      border-radius: 20px;
      line-height: 1;
      transition: background 0.18s, border-color 0.18s;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      gap: 7px;
      letter-spacing: 0.5px;
    }

    .back-btn:active { background: rgba(255,255,255,0.38); }
    .back-btn.hidden { visibility: hidden; pointer-events: none; }
    .back-btn span { font-size: 13px; letter-spacing: 0.5px; }

      height: 36px;
      width: auto;
      object-fit: contain;
      display: block;
    }

      text-transform: uppercase;
      display: none;
    }
